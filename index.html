<script type="text/plain" id="app-source">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ============================================================
   色トークン (Field Notebook / 標本ハンター テーマ)
   ============================================================ */
const COLORS = {
  forest: '#E3F6FD',
  forestDeep: '#A9DDF0',
  paper: '#FFFFFF',
  paperDark: '#E6F4FA',
  amber: '#E8A33D',
  leaf: '#52B788',
  leafDeep: '#2D6A4F',
  coral: '#E76F51',
  bark: '#8C5E3C',
  ink: '#123A52',
  inkSoft: '#4C7A93',
  sky: '#0E86C6',
  tile: '#EAF7FD',
};

/* 画像・音声データは Babel の変換対象外の別scriptに分離してある (起動高速化) */
const { LOGO_DATA_URI, BGM_MUSIC_URI, SUCCESS_SOUND_URI, LEVELUP_VOICE_URI, COMBO_FANFARE_URI, CLEAR_FANFARE_URI, TIMEOUT_FANFARE_URI, SPEED_PRAISE_URI } = window.__FXF_ASSETS;



/* ============================================================
   数学ヘルパー
   ============================================================ */
function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) { [a, b] = [b, a % b]; }
  return a || 1;
}
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randSign() { return Math.random() < 0.5 ? 1 : -1; }
function randNonZero(min, max) { let v = 0; while (v === 0) v = randInt(min, max); return v; }

// factor: {type:'linear', a, b}     => (ax + b), a>0
// factor: {type:'const', k}         => k
// factor: {type:'quadratic', A,B,C} => (Ax² + Bx + C)  ※3乗の因数分解で使う
function factorKey(f) {
  if (f.type === 'linear') return `L${f.a}_${f.b}`;
  if (f.type === 'quadratic') return `Q${f.A}_${f.B}_${f.C}`;
  return `C${f.k}`;
}

// 係数配列(次数の高い順)に変換して、一般の多項式乗算で掛け合わせる。
// これにより const/linear/quadratic のどんな組み合わせも共通のロジックで扱える。
function toCoeffs(f) {
  if (f.type === 'linear') return [f.a, f.b];
  if (f.type === 'quadratic') return [f.A, f.B, f.C];
  return [f.k];
}
function multiply(f1, f2) {
  const c1 = toCoeffs(f1);
  const c2 = toCoeffs(f2);
  const raw = new Array(c1.length + c2.length - 1).fill(0);
  for (let i = 0; i < c1.length; i++) {
    for (let j = 0; j < c2.length; j++) raw[i + j] += c1[i] * c2[j];
  }
  // raw は次数の高い順。x4〜x0 の5項に正規化する(最大で2次×2次=4次まで対応)。
  const padded = [0, 0, 0, 0, 0];
  for (let i = 0; i < raw.length; i++) {
    const degree = raw.length - 1 - i;
    if (degree <= 4) padded[4 - degree] = raw[i];
  }
  return { x4: padded[0], x3: padded[1], x2: padded[2], x1: padded[3], x0: padded[4] };
}
function polyEqual(p1, p2) {
  return p1.x4 === p2.x4 && p1.x3 === p2.x3 && p1.x2 === p2.x2 && p1.x1 === p2.x1 && p1.x0 === p2.x0;
}

function formatLinear(f) {
  const coef = f.a === 1 ? 'x' : `${f.a}x`;
  const cst = f.b > 0 ? `+${f.b}` : f.b < 0 ? `${f.b}` : '';
  return `(${coef}${cst})`;
}
function formatQuadraticFactor(f) {
  const terms = [];
  if (f.A !== 0) terms.push({ pow: 2, coef: f.A });
  if (f.B !== 0) terms.push({ pow: 1, coef: f.B });
  if (f.C !== 0) terms.push({ pow: 0, coef: f.C });
  const inner = terms.map((t, i) => {
    const sign = t.coef < 0 ? '-' : (i === 0 ? '' : '+');
    const abs = Math.abs(t.coef);
    const coefStr = (t.pow !== 0 && abs === 1) ? '' : `${abs}`;
    const varStr = t.pow === 2 ? 'x²' : t.pow === 1 ? 'x' : '';
    return i === 0 ? `${sign}${coefStr}${varStr}` : ` ${sign} ${coefStr}${varStr}`;
  }).join('');
  return `(${inner})`;
}
function formatFactorTile(f) {
  if (f.type === 'quadratic') return formatQuadraticFactor(f);
  if (f.type === 'linear') return formatLinear(f);
  return `${f.k}`;
}

const POW_SYMBOL = { 4: 'x⁴', 3: 'x³', 2: 'x²', 1: 'x', 0: '' };
function formatPoly(poly) {
  const terms = [];
  [4, 3, 2, 1, 0].forEach(pow => {
    const key = `x${pow}`;
    if (poly[key] !== 0) terms.push({ pow, coef: poly[key] });
  });
  if (terms.length === 0) return '0';
  return terms.map((t, i) => {
    const sign = t.coef < 0 ? '-' : (i === 0 ? '' : '+');
    const abs = Math.abs(t.coef);
    const coefStr = (t.pow !== 0 && abs === 1) ? '' : `${abs}`;
    const varStr = POW_SYMBOL[t.pow];
    return i === 0 ? `${sign}${coefStr}${varStr}` : ` ${sign} ${coefStr}${varStr}`;
  }).join('');
}

/* ============================================================
   レベル別 出題生成
   ============================================================ */
function genL1Numeric() {
  let b, c;
  do {
    b = randInt(1, 6);
    c = randSign() * randInt(1, 10);
  } while (gcd(b, Math.abs(c)) !== 1);
  const a = randInt(2, 6);
  const f1 = { type: 'const', k: a };
  const f2 = { type: 'linear', a: b, b: c };
  return { factors: [f1, f2], poly: multiply(f1, f2) };
}
function genL1Variable() {
  // x (または mx) をくくり出すパターン: mx(dx+e) = md x² + me x
  let d, e;
  do {
    d = randInt(1, 4);
    e = randSign() * randInt(1, 9);
  } while (gcd(d, Math.abs(e)) !== 1);
  const m = randInt(1, 6);
  const f1 = { type: 'linear', a: m, b: 0 }; // mx
  const f2 = { type: 'linear', a: d, b: e }; // dx+e
  return { factors: [f1, f2], poly: multiply(f1, f2) };
}
function genL1() {
  return Math.random() < 0.5 ? genL1Numeric() : genL1Variable();
}
function genL2() {
  let p, q;
  do { p = randNonZero(-9, 9); q = randNonZero(-9, 9); } while (p === q);
  const f1 = { type: 'linear', a: 1, b: p };
  const f2 = { type: 'linear', a: 1, b: q };
  return { factors: [f1, f2], poly: multiply(f1, f2) };
}
function genL3() {
  // gcd(a,b)=1 を要求する。そうしないと a²x²-b² 全体が
  // さらに数字で割れてしまう問題(例: 4x²-16)が混ざってしまう。
  let a, b;
  do {
    a = randInt(1, 3);
    b = randInt(1, 9);
  } while (gcd(a, b) !== 1);
  const f1 = { type: 'linear', a, b };
  const f2 = { type: 'linear', a, b: -b };
  return { factors: [f1, f2], poly: multiply(f1, f2) };
}
function genL4() {
  // 3乗の和・差: x³±n³ = (x±n)(x²∓nx+n²)
  const n = randInt(1, 5);
  const isSum = Math.random() < 0.5;
  const linear = { type: 'linear', a: 1, b: isSum ? n : -n };
  const quad = { type: 'quadratic', A: 1, B: isSum ? -n : n, C: n * n };
  return { factors: [linear, quad], poly: multiply(linear, quad) };
}
function genL5() {
  // 各因数の中身 (a,b) と (c,d) がそれぞれ互いに素であれば、
  // 展開した式全体も自動的に「これ以上数字で括れない」形になる。
  let a, b, c, d;
  do {
    do { a = randInt(1, 3); c = randInt(1, 3); } while (a < 2 && c < 2);
    b = randNonZero(-6, 6);
    d = randNonZero(-6, 6);
  } while (gcd(a, Math.abs(b)) !== 1 || gcd(c, Math.abs(d)) !== 1);
  const f1 = { type: 'linear', a, b };
  const f2 = { type: 'linear', a: c, b: d };
  return { factors: [f1, f2], poly: multiply(f1, f2) };
}
const GENERATORS = { 1: genL1, 2: genL2, 3: genL3, 4: genL4, 5: genL5 };

/* ============================================================
   ダミー(誤答)生成
   ============================================================ */
function flipSign(f) {
  if (f.type === 'const') return { type: 'const', k: -f.k };
  // quadratic は中央の項(±nx)の符号を間違えるのが典型的なミスなのでそこを反転する
  if (f.type === 'quadratic') return { type: 'quadratic', A: f.A, B: -f.B, C: f.C };
  return { type: 'linear', a: f.a, b: -f.b };
}
function shiftConst(f) {
  const d = randSign();
  if (f.type === 'const') return { type: 'const', k: f.k + d };
  if (f.type === 'quadratic') return { type: 'quadratic', A: f.A, B: f.B, C: f.C + d };
  return { type: 'linear', a: f.a, b: f.b + d };
}
function foreignFactor(level) {
  const { factors } = GENERATORS[level]();
  return factors[randInt(0, 1)];
}

function genDummies(level, correctFactors) {
  const dummies = [];
  const pushUnique = (f) => {
    const key = factorKey(f);
    if (!correctFactors.some(cf => factorKey(cf) === key) && !dummies.some(d => factorKey(d) === key)) {
      dummies.push(f);
    }
  };
  for (let i = 0; i < randInt(1, 2); i++) pushUnique(flipSign(correctFactors[randInt(0, 1)]));
  for (let i = 0; i < randInt(1, 2); i++) pushUnique(shiftConst(correctFactors[randInt(0, 1)]));
  for (let i = 0; i < randInt(1, 2); i++) pushUnique(foreignFactor(level));
  // 盤面のマス数は有限なので、ダミーが多すぎないよう上限を設ける(最終的な枚数はbuildBoard側でtileCountに切り詰める)
  return dummies.slice(0, 5);
}

/* ============================================================
   盤面生成 (整合性チェック付き)
   ============================================================ */
function buildBoard(level, seenSet, tileCount = 9) {
  let factors, poly, sig;
  let outerAttempt = 0;
  do {
    ({ factors, poly } = GENERATORS[level]());
    sig = `${level}:${poly.x4},${poly.x3},${poly.x2},${poly.x1},${poly.x0}`;
    outerAttempt++;
  } while (seenSet && seenSet.has(sig) && outerAttempt < 60);
  if (seenSet) seenSet.add(sig);

  let tiles = [];
  let attempt = 0;
  while (true) {
    attempt++;
    const dummies = genDummies(level, factors);
    let pool = [...factors, ...dummies];
    let guard = 0;
    while (pool.length < tileCount && guard < 200) {
      guard++;
      const f = foreignFactor(level);
      const key = factorKey(f);
      if (!pool.some(p => factorKey(p) === key)) pool.push(f);
    }
    // 正解ペア2枚は pool の先頭にあるので、slice しても必ず盤面に残る
    pool = pool.slice(0, tileCount);
    tiles = pool.map((f, idx) => ({ id: `${Date.now()}_${idx}_${Math.random().toString(36).slice(2)}`, factor: f }));
    for (let i = tiles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    let matchCount = 0;
    for (let i = 0; i < tiles.length && matchCount <= 1; i++) {
      for (let j = i + 1; j < tiles.length; j++) {
        if (polyEqual(multiply(tiles[i].factor, tiles[j].factor), poly)) {
          matchCount++;
          if (matchCount > 1) break;
        }
      }
    }
    if (matchCount === 1) break;
    if (attempt > 40) break;
  }
  return { tiles, poly };
}

// 全レベル解放後(レベル5解放=12問正解後)のレベル出現率を、スコアに応じて調整する。
// スコアが100上がるごとに: Lv1 -3%(下限2%)、Lv2 変化なし、Lv3 -2%(下限8%)、
// Lv4 -1%(下限14%)、Lv5 +5%(上限56%)
function pickWeightedLevel(score) {
  const tier = Math.floor(Math.max(score, 0) / 100);
  const w1 = Math.max(2, 20 - 3 * tier);
  const w2 = 20;
  const w3 = Math.max(8, 20 - 2 * tier);
  const w4 = Math.max(14, 20 - 1 * tier);
  const w5 = Math.min(56, 20 + 5 * tier);
  const weights = [w1, w2, w3, w4, w5];
  const total = weights.reduce((a, b) => a + b, 0);
  if (total <= 0) return 5;
  let r = Math.random() * total;
  for (let i = 0; i < weights.length; i++) {
    if (r < weights[i]) return i + 1;
    r -= weights[i];
  }
  return 5;
}

function hashRotation(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
  return (h % 7) - 3;
}

/* ============================================================
   音声データURLを直接デコードするヘルパー
   Tone.Player に url を渡す方式(内部でfetchを使う)だと、この
   サンドボックス化された環境では data:URL の取得がブロックされて
   いる可能性が高く、音声ファイルが一切読み込めていなかったと
   考えられる。fetchを一切使わず、base64文字列を自前でバイナリに
   変換し、AudioContextのdecodeAudioDataに直接渡す方式にする。
   ============================================================ */
// デコード済みAudioBufferのキャッシュ。毎ゲーム開始のたびに
// base64変換+デコードをやり直すのは重いので、1度デコードしたら使い回す。
const __audioBufferCache = new Map();
async function decodeDataUriToAudioBuffer(dataUri) {
  if (__audioBufferCache.has(dataUri)) return __audioBufferCache.get(dataUri);
  const base64 = dataUri.split(',')[1];
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);

  const ctx = Tone.getContext();
  let bufferPromise;
  if (typeof ctx.decodeAudioData === 'function') {
    bufferPromise = ctx.decodeAudioData(bytes.buffer);
  } else {
    const native = ctx.rawContext || ctx._context || ctx;
    bufferPromise = native.decodeAudioData(bytes.buffer);
  }
  const buffer = await bufferPromise;
  __audioBufferCache.set(dataUri, buffer);
  return buffer;
}

  /* --- iOSでinputタップ時に自動ズームされたまま戻らなくなるのを防ぐ保険 --- */
  useEffect(() => {
    let meta = document.querySelector('meta[name="viewport"]');
    const hadMeta = !!meta;
    const prevContent = meta ? meta.getAttribute('content') : null;
    if (!meta) {
      meta = document.createElement('meta');
      meta.setAttribute('name', 'viewport');
      document.head.appendChild(meta);
    }
    meta.setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no');
    return () => {
      if (hadMeta) {
        if (prevContent !== null) meta.setAttribute('content', prevContent);
      } else if (meta.parentNode) {
        meta.parentNode.removeChild(meta);

  }, []);

    if (levelupVoicePlayerRef.current) levelupVoicePlayerRef.current.mute = muted;
    if (comboPlayerRef.current) comboPlayerRef.current.mute = muted;
    if (speedPraisePlayerRef.current) speedPraisePlayerRef.current.mute = muted;

  /* --- プレイ中は画面全体のスワイプ移動を常にブロック --- */
  const applyBodyScrollLock = () => {
    const html = document.documentElement;

    html.style.touchAction = 'none';
    body.style.touchAction = 'none';
    body.style.overflow = 'hidden';
    body.style.overscrollBehavior = 'none';
    body.style.position = 'fixed';
    body.style.width = '100%';
  };
  const releaseBodyScrollLock = () => {
    const html = document.documentElement;
    const body = document.body;
    html.style.touchAction = '';
    body.style.touchAction = '';
    body.style.overflow = '';
    body.style.overscrollBehavior = '';
    body.style.position = '';
    body.style.width = '';
  };

  useEffect(() => {
    if (screen !== 'playing') return;

    document.addEventListener('touchmove', blockScroll, { passive: false });

    // 自分のdiv(.game-lock)の外側、body/html 自体もスクロールできないようにする。

    // 場所からのスワイプでページごと動いてしまうことがある。
    // なお、画面遷移した「直後」の一瞬だけロックが間に合わない隙間ができるのを防ぐため、
    // 実際のロック適用自体は startGame() 側で画面遷移と同時に(同期的に)行っている。

    applyBodyScrollLock();

    return () => {

  }, [screen]);

  const finishGame = useCallback((finalScore, finalCaught, nextScreen = 'gameover') => {
    setBest(b => Math.max(b, finalScore));
    const name = (playerName.trim() || 'プレイヤー').slice(0, 10);
    const newEntry = { name, score: finalScore, caught: finalCaught, difficulty };
    let madeRanking = false;
    if (finalScore > 0) {
      setRanking(prev => {
        const top3 = [...prev, newEntry].sort((a, b) => b.score - a.score).slice(0, 3);
        madeRanking = top3.includes(newEntry);
        return top3;
      });

    setRankedIn(madeRanking);
    // ネットランキング: 名前が入力済みなら即送信、未入力ならゲームオーバー画面で

    if (GAS_ENDPOINT_URL && finalScore > 0) {

      setPendingNetEntry(entry);

    if (document.activeElement && typeof document.activeElement.blur === 'function') {

    document.body.style.width = '';

    seenProblemsRef.current = new Set();

    setPendingNetEntry(null); // 前回の送信待ちスコアは破棄
    setNetSubmitState('none');

    questionStartTimeRef.current = Date.now();
    setDifficulty(chosenDifficulty);
    setUnlockedLevel(1);
    setQuestionLevel(1);
    setBoard(tiles);
    setPoly(poly);
    setScore(0);
    setCombo(0);

  // unlockedLvl までの範囲からレベルを選んで次の問題を出す。

  const nextQuestion = useCallback((unlockedLvl, currentScore) => {
    const lvl = unlockedLvl >= 5 ? pickWeightedLevel(currentScore || 0) : randInt(1, unlockedLvl);
    const { tiles, poly } = buildBoard(lvl, seenProblemsRef.current, DIFFICULTY_CONFIG[difficultyRef.current].tileCount);
    setBoard(tiles);
    setPoly(poly);
    setQuestionLevel(lvl);

  }, []);

  const showTopMessage = (text, kind, duration) => {

  const getCenter = (id) => {
    const el = tileRefs.current[id];
    const grid = gridRef.current;
    if (!el || !grid) return { x: 0, y: 0 };
    const r = el.getBoundingClientRect();
    const g = grid.getBoundingClientRect();
    return { x: r.left + r.width / 2 - g.left, y: r.top + r.height / 2 - g.top };
  };

  const cancelSelection = () => {
    setSelectedId(null);

  const attemptMatch = (id1, id2) => {
    const t1 = board.find(t => t.id === id1);
    const t2 = board.find(t => t.id === id2);
    if (!t1 || !t2) { cancelSelection(); return; }
    const result = multiply(t1.factor, t2.factor);
    const isCorrect = polyEqual(result, poly);
    setResolving(true);
    setDragging(false);
    if (isCorrect) {
      playSuccessSound();
      setFlashMap({ [id1]: 'correct', [id2]: 'correct' });
      const newCombo = combo + 1;
      const mult = 1 + combo * 0.1;
      // 基本得点: Lv.5(たすきがけ)のみ30点、それ以外は10点
      const basePoint = questionLevel === 5 ? 30 : 10;
      const gain = Math.round(basePoint * mult);
      // 時間ボーナス: 解いた問題のレベル×1秒(基本) + コンボ数×0.2秒(上限3秒)
      const baseRecovery = questionLevel * 1;
      const comboBonus = Math.min(newCombo * 0.2, 2);
      const timeBonus = Math.round((baseRecovery + comboBonus) * 10) / 10;
      setLastGain(gain);
      setLastTimeBonus(timeBonus);
      const newCaught = caught + 1;
      // 3問正解するごとにレベルアップし、そのレベルまでの問題が混ざるようになる
      const willLevelUp = newCaught % 3 === 0 && unlockedLevel < 5;
      const newUnlocked = willLevelUp ? unlockedLevel + 1 : unlockedLevel;
      const comboFanfare = newCombo % 5 === 0; // 5コンボごとにファンファーレ
      const newScore = score + gain;
      const newTimeLeft = Math.round((timeLeft + timeBonus) * 10) / 10;
      const isClear = newCaught >= DIFFICULTY_CONFIG[difficulty].clearCount; // 難易度ごとの目標問題数でクリア
      const clearBonus = isClear ? Math.round(newTimeLeft) : 0;
      // 回答スピードに応じたメッセージ(優先度: レベルアップ > 5コンボ > スピード)
      const elapsedSec = (Date.now() - questionStartTimeRef.current) / 1000;
      const isSpeedy = elapsedSec <= 3; // 3秒以内の高速回答
      let speedText;
      if (isSpeedy) speedText = '速い！速すぎる！インチキでしょ！';
      else if (elapsedSec <= 5) speedText = 'やるねぇ！';
      else if (elapsedSec <= 10) speedText = 'ナイス！';
      else speedText = '頑張ったね！';
      setTimeout(() => {
        setCombo(newCombo);
        setCaught(newCaught);
        if (willLevelUp) {
          setUnlockedLevel(newUnlocked);
          showTopMessage(`🎉 Lv.${newUnlocked}「${LEVEL_INFO[newUnlocked].name}」が解放されました！`, 'levelup', 1600);
        } else if (comboFanfare) {
          showTopMessage('ナイスコンボ！', 'combo', 1300);
        } else {
          showTopMessage(speedText, 'speed', 1300);
        }
        if (willLevelUp) {
          playLevelUpVoice();
        }
        if (comboFanfare) {
          playComboSound();
        }
        if (isSpeedy) {
          playSpeedPraise();
        }
        setFlashMap({});
        setSelectedId(null);
        setResolving(false);
        if (isClear) {
          // クリア: 残り時間の秒数をそのままスコアに加算してゲーム終了
          playClearFanfare();
          setScore(s => s + gain + clearBonus);
          setTimeLeft(0);
          setCleared(true);
          setClearTimeBonus(clearBonus);
          finishGame(newScore + clearBonus, newCaught);
        } else {
          setScore(s => s + gain);
          setTimeLeft(tl => Math.round((tl + timeBonus) * 10) / 10);
          nextQuestion(newUnlocked, newScore);
        }
      }, 420);
      setTimeout(() => { setLastGain(null); setLastTimeBonus(null); }, 1300);
    } else {
      playBuzz();
      setFlashMap({ [id1]: 'wrong', [id2]: 'wrong' });
      setCombo(0);
      setTimeLeft(tl => Math.round(Math.max(tl - 1, 0) * 10) / 10);
      setLastTimePenalty(1);
      setTimeout(() => {
        setFlashMap({});
        setSelectedId(null);
        setResolving(false);
      }, 420);
      setTimeout(() => setLastTimePenalty(null), 900);
    }
  };

  /* --- ポインター操作 --- */
  const onTilePointerDown = (e, id) => {
    if (resolving || screen !== 'playing') return;
    e.preventDefault();
    if (Tone.getContext().state !== 'running') {
      Tone.start().catch(() => {});
    }
    setSelectedId(id);
    setDragging(true);
    const c = getCenter(id);
    setDragPos(c);
  };

  useEffect(() => {
    if (!dragging) return;
    // pointermoveは高リフレッシュレート端末で毎秒120回以上発火し、そのたびに
    // 全体が再レンダーされてカクつく原因になる。rAFで1フレーム1回に間引く。
    let rafId = null;
    let pendingPos = null;
    const onMove = (e) => {
      // ドラッグ中は必ずデフォルト動作(ページのスクロール/引っ張って更新)を止める。
      // これを呼ばないと、上→下スワイプがブラウザの pull-to-refresh と解釈され
      // ページごと再読み込みされてゲームが消えてしまう。
      if (e.cancelable) e.preventDefault();
      const grid = gridRef.current;
      if (!grid) return;
      const g = grid.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      pendingPos = { x: clientX - g.left, y: clientY - g.top };
      if (rafId === null) {
        rafId = requestAnimationFrame(() => {
          rafId = null;
          if (pendingPos) setDragPos(pendingPos);
        });
      }
    };
    const onUp = (e) => {
      const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
      const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
      const el = document.elementFromPoint(clientX, clientY);
      const tileEl = el && el.closest ? el.closest('[data-tile-id]') : null;
      if (tileEl) {
        const targetId = tileEl.getAttribute('data-tile-id');
        if (targetId && targetId !== selectedId) {
          attemptMatch(selectedId, targetId);
          return;
        }
      }
      cancelSelection();
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onUp);
    return () => {
      if (rafId !== null) cancelAnimationFrame(rafId);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [dragging, selectedId, board, poly, combo, caught, unlockedLevel, questionLevel]);

  const targetText = useMemo(() => formatPoly(poly), [poly]);
  const wholeTime = Math.floor(Math.max(timeLeft, 0));
  const mm = String(Math.floor(wholeTime / 60)).padStart(1, '0');
  const ss = String(wholeTime % 60).padStart(2, '0');

  /* ============================================================
     画面: メニュー
     ============================================================ */
  if (screen === 'menu') {
    return (
      <div className="min-h-screen w-full flex flex-col items-center py-8 px-4" style={{ background: `linear-gradient(180deg, ${COLORS.forest}, ${COLORS.forestDeep})`, fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>
        <FontImport />
        <div className="max-w-md sm:max-w-xl md:max-w-4xl w-full">
          <div className="text-center mb-2">
            <span style={{ color: COLORS.amber, fontFamily: "'Zen Maru Gothic', sans-serif", letterSpacing: '0.1em' }} className="text-xs font-bold uppercase">Factor × Factor Field Guide</span>
          </div>
          <div className="flex justify-center mb-4">
            <img src={LOGO_DATA_URI} alt="FACTOR × FACTOR" style={{ width: '100%', maxWidth: '220px', height: 'auto' }} />
          </div>

          <button
            onClick={() => { setTutorialStep(0); setScreen('tutorial'); }}
            className="w-full rounded-2xl py-3 mb-3 text-sm font-black shadow-lg transition-transform active:scale-95"
            style={{ background: COLORS.paper, color: COLORS.sky, border: `2px solid ${COLORS.sky}55`, fontFamily: "'Zen Maru Gothic', sans-serif" }}
          >
            📖 チュートリアルを読む
          </button>

          <div className="mb-6">
            <label className="text-xs font-bold block mb-1" style={{ color: COLORS.inkSoft }}>なまえ</label>
            <input
              type="text"
              value={playerName}
              onChange={(e) => setPlayerName(e.target.value.slice(0, 10))}
              onBlur={() => window.scrollTo(0, 0)}
              placeholder="なまえ (省略可・10文字まで)"
              maxLength={10}
              className="w-full rounded-xl px-3 py-2 font-bold"
              style={{ background: COLORS.paper, color: COLORS.ink, border: `2px solid ${COLORS.sky}55`, fontSize: '16px' }}
            />
          </div>

          <div className="grid grid-cols-3 gap-2 mb-6">
            {['easy', 'normal', 'hard'].map(diff => {
              const cfg = DIFFICULTY_CONFIG[diff];
              const mm = Math.floor(cfg.startTime / 60);
              const ss = cfg.startTime % 60;
              const timeLabel = ss === 0 ? `${mm}分` : `${mm}分${ss}秒`;
              return (
                <button
                  key={diff}
                  onClick={() => startGame(diff)}
                  className="rounded-2xl py-3 px-1 text-center shadow-lg transition-transform active:scale-95"
                  style={{ background: cfg.color, fontFamily: "'Zen Maru Gothic', sans-serif" }}
                >
                  <div className="text-sm font-black" style={{ color: '#FFFFFF' }}>{cfg.label}</div>
                  <div className="text-[10px] font-bold mt-1" style={{ color: '#FFFFFFDD' }}>{cfg.clearCount}問</div>
                  <div className="text-[10px] font-bold" style={{ color: '#FFFFFFDD' }}>{timeLabel}</div>
                </button>
              );
            })}
          </div>

          {GAS_ENDPOINT_URL !== '' && (
            <div className="rounded-2xl p-4 mb-6 shadow-lg" style={{ background: COLORS.paper }}>
              <div className="flex items-center justify-center gap-2 mb-2">
                <div className="text-xs font-bold text-center" style={{ color: COLORS.inkSoft }}>🌏 みんなのランキング</div>
                <button onClick={loadNetRanking} className="text-[10px] font-bold rounded-full px-2 py-0.5" style={{ background: COLORS.paperDark, color: COLORS.inkSoft }}>↻ 更新</button>
              </div>
              {netStatus === 'loading' && (
                <div className="text-xs text-center py-2" style={{ color: COLORS.inkSoft }}>読み込み中…</div>
              )}
              {netStatus === 'error' && (
                <div className="text-xs text-center py-2" style={{ color: COLORS.coral }}>読み込みに失敗しました。通信環境を確認して「↻ 更新」を押してね。</div>
              )}
              {netStatus === 'ok' && NET_RANKING_DIFF_ORDER.every(k => (netRanking[k] || []).length === 0) && (
                <div className="text-xs text-center py-2" style={{ color: COLORS.inkSoft }}>まだ記録がありません。全国1位を目指そう！</div>
              )}
              {netStatus === 'ok' && !NET_RANKING_DIFF_ORDER.every(k => (netRanking[k] || []).length === 0) && (
                /* スマホ縦: 1列(上からハード→ノーマル→イージー)
                   タブレット・PC・大きめスマホの横画面(768px以上): 3列(左からイージー→ノーマル→ハード)
                   DOM順はハード→ノーマル→イージーのまま、横並び時だけorderで並べ替える */
                <div className="grid grid-cols-1 md:grid-cols-3 gap-x-3 md:items-start">
                  {NET_RANKING_DIFF_ORDER.map(diffKey => {
                    const rows = (netRanking[diffKey] || []).slice(0, 30);
                    if (rows.length === 0) return null;
                    const diffCfg = DIFFICULTY_CONFIG[diffKey];
                    const orderClass = { easy: 'md:order-1', normal: 'md:order-2', hard: 'md:order-3' }[diffKey];
                    return (
                      <div key={diffKey} className={`mb-3 md:mb-0 last:mb-0 ${orderClass}`}>
                        <div className="text-[11px] font-black rounded-full px-3 py-1 mb-1 text-center" style={{ background: diffCfg.color, color: '#fff', fontFamily: "'Zen Maru Gothic', sans-serif" }}>
                          {diffCfg.label} TOP30
                        </div>
                        <div className="flex flex-col gap-1">
                          {rows.map((r, i) => (
                            <div key={i} className="flex items-center gap-2 md:gap-1 text-sm rounded-lg px-2 md:px-1 py-1.5" style={{ background: i === 0 ? `${COLORS.amber}26` : 'transparent' }}>
                              {i < 3 ? (
                                <span className="text-lg leading-none w-6 md:w-5 text-center shrink-0">{['🥇', '🥈', '🥉'][i]}</span>
                              ) : (
                                <span className="font-mono font-black w-6 md:w-5 text-right shrink-0" style={{ color: COLORS.inkSoft }}>{i + 1}.</span>
                              )}
                              <span className="font-bold flex-1 truncate" style={{ color: COLORS.ink, fontFamily: "'Zen Maru Gothic', sans-serif" }}>{r.name}</span>
                              <span className="font-mono font-black shrink-0" style={{ color: COLORS.leafDeep }}>{r.score}点</span>
                              <span className="text-xs font-bold shrink-0" style={{ color: COLORS.inkSoft }}>{r.caught}組</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          <div className="rounded-2xl p-4 mb-6 shadow-lg" style={{ background: COLORS.paper }}>
            <div className="text-xs font-bold mb-2 text-center" style={{ color: COLORS.inkSoft }}>🏆 ランキング TOP3</div>
            {!STORAGE_AVAILABLE && (
              <div className="text-[10px] text-center mb-1 rounded-lg px-2 py-1" style={{ background: `${COLORS.coral}22`, color: COLORS.coral, fontWeight: 700 }}>
                ⚠️ この環境ではランキングを保存できません（ブラウザの設定でサイトデータの保存がブロックされています）
              </div>
            )}
            {ranking.length === 0 ? (
              <div className="text-xs text-center py-2" style={{ color: COLORS.inkSoft }}>まだ記録がありません。最初の1位を目指そう！</div>
            ) : (
              <div className="flex flex-col gap-1">
                {ranking.map((r, i) => {
                  const diffCfg = DIFFICULTY_CONFIG[r.difficulty] || DIFFICULTY_CONFIG.normal;
                  return (
                    <div key={i} className="flex items-center gap-2 text-sm rounded-lg px-2 py-1.5" style={{ background: i === 0 ? `${COLORS.amber}26` : 'transparent' }}>
                      <span className="text-lg leading-none">{['🥇', '🥈', '🥉'][i]}</span>
                      <span className="text-[9px] font-black rounded-full w-5 h-5 flex items-center justify-center shrink-0" style={{ background: diffCfg.color, color: '#fff' }} title={diffCfg.label}>
                        {diffCfg.label[0]}
                      </span>
                      <span className="font-bold flex-1 truncate" style={{ color: COLORS.ink, fontFamily: "'Zen Maru Gothic', sans-serif" }}>{r.name}</span>
                      <span className="font-mono font-black" style={{ color: COLORS.leafDeep }}>{r.score}点</span>
                      <span className="text-xs font-bold" style={{ color: COLORS.inkSoft }}>{r.caught}組</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div className="rounded-2xl p-4 mb-6 shadow-lg" style={{ background: COLORS.paper }}>
            <p className="text-xs font-bold mb-3" style={{ color: COLORS.inkSoft }}>正解するごとに、だんだん難しくなるよ！</p>
            <div className="flex flex-col gap-2">
              {[1, 2, 3, 4, 5].map(lv => {
                const info = LEVEL_INFO[lv];
                return (
                  <div key={lv} className="flex items-center gap-2 text-xs">
                    <span className="w-14 shrink-0 font-black rounded-full text-center py-0.5" style={{ background: info.color, color: COLORS.paper }}>Lv.{lv}</span>
                    <span className="font-bold" style={{ color: COLORS.ink }}>{info.name}</span>
                    <span className="ml-auto font-mono" style={{ color: COLORS.inkSoft }}>{info.example}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ============================================================
     画面: チュートリアル
     ============================================================ */
  if (screen === 'tutorial') {
    const step = TUTORIAL_STEPS[tutorialStep];
    const isLast = tutorialStep === TUTORIAL_STEPS.length - 1;
    return (
      <div className="min-h-screen w-full flex flex-col items-center justify-center py-8 px-4" style={{ background: `linear-gradient(180deg, ${COLORS.forest}, ${COLORS.forestDeep})`, fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>
        <FontImport />
        <div className="max-w-md sm:max-w-xl w-full rounded-3xl p-6 shadow-2xl" style={{ background: COLORS.paper }}>
          <div className="flex justify-center gap-1.5 mb-4">
            {TUTORIAL_STEPS.map((_, i) => (
              <div key={i} className="rounded-full" style={{ width: i === tutorialStep ? '18px' : '6px', height: '6px', background: i === tutorialStep ? COLORS.sky : `${COLORS.sky}44`, transition: 'all 200ms' }} />
            ))}
          </div>

          <div className="text-center text-base font-black mb-3" style={{ color: COLORS.ink, fontFamily: "'Zen Maru Gothic', sans-serif" }}>{step.title}</div>

          <div className="mb-4 flex items-center justify-center" style={{ minHeight: '110px' }}>
            <TutorialVisual step={tutorialStep} />
          </div>

          <p className="text-sm text-center mb-6 leading-relaxed" style={{ color: COLORS.inkSoft }}>{step.body}</p>

          <div className="flex gap-2">
            {tutorialStep > 0 && (
              <button onClick={() => setTutorialStep(s => s - 1)} className="flex-1 rounded-xl py-3 font-bold border-2 active:scale-95 transition-transform" style={{ borderColor: COLORS.sky, color: COLORS.sky }}>戻る</button>
            )}
            <button
              onClick={() => { if (isLast) setScreen('menu'); else setTutorialStep(s => s + 1); }}
              className="flex-1 rounded-xl py-3 font-bold shadow active:scale-95 transition-transform"
              style={{ background: COLORS.amber, color: COLORS.ink }}
            >
              {isLast ? 'とじる' : '次へ'}
            </button>
          </div>
          {!isLast && (
            <button onClick={() => setScreen('menu')} className="w-full text-center text-xs font-bold mt-3 py-1" style={{ color: COLORS.inkSoft }}>スキップしてタイトルへ</button>
          )}
        </div>
      </div>
    );
  }

  /* ============================================================
     画面: ゲームオーバー
     ============================================================ */
  if (screen === 'gameover') {
    const isRecord = score >= best && score > 0;
    return (
      <div className="min-h-screen w-full flex flex-col items-center justify-center py-8 px-4" style={{ background: `linear-gradient(180deg, ${COLORS.forest}, ${COLORS.forestDeep})`, fontFamily: "'Zen Kaku Gothic New', sans-serif" }}>
        <FontImport />
        <div className="max-w-sm sm:max-w-md md:max-w-lg w-full rounded-3xl p-6 shadow-2xl text-center" style={{ background: COLORS.paper }}>
          <div className="text-sm font-bold mb-1" style={{ color: cleared ? COLORS.leafDeep : COLORS.coral, fontFamily: "'Zen Maru Gothic', sans-serif" }}>{cleared ? `🎉 クリア！(${DIFFICULTY_CONFIG[difficulty].clearCount}問達成)` : 'タイムアップ！'}</div>
          <div className="text-5xl font-black mb-1" style={{ color: COLORS.ink, fontFamily: "'Zen Maru Gothic', sans-serif" }}>{score}</div>
          {cleared && <div className="text-xs font-bold mb-1" style={{ color: COLORS.leafDeep }}>(残り時間ボーナス +{clearTimeBonus})</div>}
          <div className="text-xs mb-1" style={{ color: COLORS.inkSoft }}>捕獲した因数ペア: {caught}組</div>
          <div className="text-xs mb-1" style={{ color: COLORS.inkSoft }}>難易度: {DIFFICULTY_CONFIG[difficulty].label}</div>
          <div className="text-xs mb-4" style={{ color: COLORS.inkSoft }}>到達レベル: Lv.{unlockedLevel} {LEVEL_INFO[unlockedLevel].name}</div>
          {isRecord && <div className="text-xs font-bold mb-1" style={{ color: COLORS.leafDeep }}>🏆 自己ベスト更新！</div>}
          {rankedIn && <div className="text-xs font-bold mb-4" style={{ color: COLORS.coral }}>🎉 ランキング入り！</div>}
          {!rankedIn && <div className="mb-4" />}

          {/* ネットランキング送信エリア: 名前未入力で終了した場合はここで入力してから送信 */}
          {GAS_ENDPOINT_URL !== '' && netSubmitState !== 'none' && (
            <div className="rounded-2xl p-3 mb-4 text-left" style={{ background: COLORS.paperDark }}>
              {(netSubmitState === 'pending' || netSubmitState === 'error') && (
                <div>
                  <div className="text-xs font-bold mb-2 text-center" style={{ color: COLORS.ink }}>
                    {netSubmitState === 'error'
                      ? '⚠️ 送信に失敗しました。もう一度試してね'
                      : '🌏 なまえを入れて、みんなのランキングに登録しよう！'}
                  </div>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      value={playerName}
                      onChange={(e) => setPlayerName(e.target.value.slice(0, 10))}
                      placeholder="なまえ (10文字まで)"
                      maxLength={10}
                      className="flex-1 min-w-0 rounded-xl px-3 py-2 text-sm font-bold"
                      style={{ background: COLORS.paper, color: COLORS.ink, border: `2px solid ${COLORS.sky}55`, fontFamily: "'Zen Maru Gothic', sans-serif" }}
                    />
                    <button
                      onClick={submitPendingScore}
                      disabled={!playerName.trim()}
                      className="rounded-xl px-4 py-2 text-sm font-black shadow active:scale-95 transition-transform shrink-0"
                      style={{ background: playerName.trim() ? COLORS.sky : `${COLORS.sky}55`, color: '#fff', fontFamily: "'Zen Maru Gothic', sans-serif" }}
                    >
                      {netSubmitState === 'error' ? '再送信' : '送信'}
                    </button>
                  </div>
                  {netSubmitState === 'pending' && (
                    <button onClick={() => { setNetSubmitState('none'); setPendingNetEntry(null); }} className="w-full text-center text-[10px] font-bold mt-2" style={{ color: COLORS.inkSoft }}>
                      送信しないでスキップ
                    </button>
                  )}
                </div>
              )}
              {netSubmitState === 'sending' && (
                <div className="text-xs font-bold text-center py-1" style={{ color: COLORS.inkSoft }}>🌏 みんなのランキングに送信中…</div>
              )}
              {netSubmitState === 'sent' && (
                <div className="text-xs font-bold text-center py-1" style={{ color: COLORS.leafDeep }}>✅ みんなのランキングに登録しました！</div>
              )}
            </div>
          )}

          <div className="flex flex-col gap-2">
            <button onClick={() => startGame(difficulty)} className="rounded-xl py-3 font-bold shadow active:scale-95 transition-transform" style={{ background: COLORS.amber, color: COLORS.ink }}>もう一度あそぶ({DIFFICULTY_CONFIG[difficulty].label})</button>
            <button onClick={() => setScreen('menu')} className="rounded-xl py-3 font-bold border-2 active:scale-95 transition-transform" style={{ borderColor: COLORS.sky, color: COLORS.sky }}>タイトルに戻る</button>
          </div>
        </div>
      </div>
    );
  }

  /* ============================================================
     画面: プレイ中
     ============================================================ */
  return (
    <div
      className="game-lock w-full flex flex-col items-center px-3"
      style={{
        height: '100dvh',
        maxHeight: '100dvh',
        overflow: 'hidden',
        paddingTop: 'max(0.6rem, env(safe-area-inset-top))',
        paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))',
        background: `linear-gradient(180deg, ${COLORS.forest}, ${COLORS.forestDeep})`,
        fontFamily: "'Zen Kaku Gothic New', sans-serif",
        touchAction: 'none',
        overscrollBehavior: 'none',
      }}
    >
      <FontImport />
      <div className="max-w-md sm:max-w-xl md:max-w-2xl lg:max-w-3xl w-full flex flex-col" style={{ height: '100%', minHeight: 0 }}>

        {/* メッセージ表示エリア: 内容があってもなくても常に同じ高さを確保し、下のレイアウトがズレないようにする */}
        <div className="mb-2 flex items-center justify-center text-center px-1" style={{ height: '3.2rem', flexShrink: 0 }}>
          {topMessage && (
            <div
              className="text-xs sm:text-sm font-black rounded-xl py-1.5 px-3 w-full shadow-lg leading-tight"
              style={{
                background: topMessage.kind === 'levelup' ? COLORS.amber : topMessage.kind === 'combo' ? COLORS.sky : COLORS.paper,
                color: topMessage.kind === 'speed' ? COLORS.inkSoft : COLORS.ink,
                fontFamily: "'Zen Maru Gothic', sans-serif",
              }}
            >
              {topMessage.text}
            </div>
          )}
        </div>

        {/* ヘッダー (縮まない) */}
        <div className="flex items-center justify-between mb-2 px-1" style={{ flexShrink: 0 }}>
          <button onClick={() => finishGame(score, caught, 'menu')} className="text-xs font-bold px-2 py-1 rounded-lg" style={{ color: COLORS.inkSoft }}>✕ やめる</button>
          <div className="text-xs font-bold px-2 py-1 rounded-full" style={{ color: COLORS.paper, background: `${LEVEL_INFO[questionLevel].color}99` }}>Lv.{questionLevel} {LEVEL_INFO[questionLevel].name}</div>
          <button onClick={() => setMuted(m => !m)} className="text-xs font-bold px-2 py-1 rounded-lg" style={{ color: COLORS.inkSoft }}>{muted ? '🔇' : '🔊'}</button>
        </div>

        <div className="flex items-center justify-between mb-2 gap-2" style={{ flexShrink: 0 }}>
          <div className="flex-1 rounded-xl px-3 py-1.5 text-center" style={{ background: COLORS.paper }}>
            <div className="text-[10px] font-bold" style={{ color: COLORS.inkSoft }}>SCORE</div>
            <div className="text-xl md:text-2xl font-black" style={{ color: COLORS.ink, fontFamily: "'Zen Maru Gothic', sans-serif" }}>{score}</div>
          </div>
          <div className="flex-1 rounded-xl px-3 py-1.5 text-center relative overflow-visible" style={{ background: timeLeft <= 10 ? COLORS.coral : COLORS.paper }}>
            <div className="text-[10px] font-bold" style={{ color: timeLeft <= 10 ? COLORS.paper : COLORS.inkSoft }}>TIME</div>
            <div className="text-xl md:text-2xl font-black" style={{ color: timeLeft <= 10 ? COLORS.paper : COLORS.ink, fontFamily: "'Zen Maru Gothic', sans-serif" }}>{mm}:{ss}</div>
            {lastTimeBonus !== null && (
              <div className="absolute -top-2 right-1 text-xs font-black animate-pulse" style={{ color: COLORS.leafDeep }}>+{lastTimeBonus}s</div>
            )}
            {lastTimePenalty !== null && (
              <div className="absolute -top-2 left-1 text-xs font-black animate-pulse" style={{ color: '#b3402c' }}>-{lastTimePenalty}s</div>
            )}
          </div>
          <div className="flex-1 rounded-xl px-3 py-1.5 text-center" style={{ background: COLORS.paper }}>
            <div className="text-[10px] font-bold" style={{ color: COLORS.inkSoft }}>COMBO</div>
            <div className="text-xl md:text-2xl font-black" style={{ color: combo > 0 ? COLORS.coral : COLORS.ink, fontFamily: "'Zen Maru Gothic', sans-serif" }}>x{multiplier.toFixed(1)}</div>
          </div>
        </div>

        {/* お題 (縮まない) */}
        <div className="rounded-2xl p-3 mb-2 text-center relative overflow-hidden" style={{ background: COLORS.paper, border: `2px dashed ${COLORS.sky}45`, borderTop: `5px solid ${LEVEL_INFO[questionLevel].color}`, flexShrink: 0 }}>
          <div className="text-[10px] font-bold mb-1 tracking-wide" style={{ color: COLORS.inkSoft }}>この式を因数分解しよう</div>
          <div className="font-black" style={{ color: COLORS.ink, fontFamily: "'Zen Maru Gothic', sans-serif", fontSize: 'clamp(1.4rem, 5.5vh, 3rem)' }}>{targetText}</div>
          {lastGain !== null && (
            <div className="absolute top-2 right-3 text-sm font-black animate-pulse" style={{ color: COLORS.leafDeep }}>+{lastGain}</div>
          )}
        </div>

        {/* 盤面: 残りの高さいっぱいまで可変に広がる (画面の高さが低くても必ず収まる) */}
        <div className="w-full flex" style={{ flex: '1 1 auto', minHeight: 0 }}>
          <div
            ref={gridRef}
            className="relative grid grid-cols-3 gap-2 sm:gap-3 md:gap-4 w-full"
            style={{ touchAction: 'none', gridTemplateRows: `repeat(${Math.max(1, Math.ceil(board.length / 3))}, 1fr)`, height: '100%' }}
          >
            <svg className="absolute inset-0 pointer-events-none" style={{ width: '100%', height: '100%', overflow: 'visible', zIndex: 10 }}>
              {dragging && selectedId && (() => {
                const c = getCenter(selectedId);
                return (
                  <>
                    <line x1={c.x} y1={c.y} x2={dragPos.x} y2={dragPos.y} stroke={COLORS.amber} strokeWidth="4" strokeLinecap="round" strokeDasharray="2 8" />
                    <circle cx={dragPos.x} cy={dragPos.y} r="16" fill="none" stroke={COLORS.amber} strokeWidth="3" />
                    <circle cx={c.x} cy={c.y} r="6" fill={COLORS.amber} />
                  </>
                );
              })()}
            </svg>

            {board.map(tile => {
              const isSelected = selectedId === tile.id;
              const flash = flashMap[tile.id];
              const rot = hashRotation(tile.id);
              let bg = COLORS.tile;
              let borderColor = `${COLORS.sky}33`;
              if (flash === 'correct') { bg = '#6FCBEF'; borderColor = COLORS.sky; }
              if (flash === 'wrong') { bg = COLORS.coral; borderColor = '#b3402c'; }
              if (isSelected && !flash) { borderColor = COLORS.amber; }
              const fontSize = tile.factor.type === 'const'
                ? 'clamp(1.1rem, 6vmin, 2.75rem)'
                : tile.factor.type === 'quadratic'
                ? 'clamp(0.7rem, 3.4vmin, 1.4rem)'
                : 'clamp(0.9rem, 4.6vmin, 2rem)';
              return (
                <div
                  key={tile.id}
                  data-tile-id={tile.id}
                  ref={el => { tileRefs.current[tile.id] = el; }}
                  onPointerDown={(e) => onTilePointerDown(e, tile.id)}
                  className="rounded-xl flex items-center justify-center font-bold shadow select-none cursor-pointer transition-colors duration-150"
                  style={{
                    background: bg,
                    border: `2px solid ${borderColor}`,
                    color: COLORS.ink,
                    transform: `rotate(${rot}deg) ${isSelected ? 'scale(1.08)' : 'scale(1)'}`,
                    transition: 'transform 120ms ease, background 150ms ease',
                    fontSize,
                    fontFamily: "'Zen Maru Gothic', sans-serif",
                    touchAction: 'none',
                  }}
                >
                  {formatFactorTile(tile.factor)}
                </div>
              );
            })}
          </div>
        </div>

        <p className="text-center text-[10px] mt-1" style={{ color: COLORS.inkSoft, flexShrink: 0 }}>タイルをドラッグしてもう一枚とつなげよう</p>
      </div>
    </div>
  );
}

function FontImport() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');
      html, body { overscroll-behavior-y: contain; }
      .game-lock, .game-lock * { touch-action: none; }
    `}</style>
  );
}

const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(<FactorHunt />);
</script>

<script>
(function () {
  function showBootError(title, detail) {
    var statusEl = document.getElementById('boot-status');
    if (statusEl) statusEl.style.display = 'none';
    var el = document.getElementById('boot-error');
    if (!el) return;
    el.style.display = 'block';
    el.textContent = '\u26A0\uFE0F ' + title + '\n\n' + detail +
      '\n\n(このメッセージのスクリーンショットを共有してもらえれば、原因を特定できます)';
  }

  window.addEventListener('error', function (e) {
    showBootError('エラーが発生しました', (e.error && e.error.stack) ? e.error.stack : e.message);
  });
  window.addEventListener('unhandledrejection', function (e) {
    var reason = e.reason;
    showBootError('エラーが発生しました (Promise)', (reason && reason.stack) ? reason.stack : String(reason));
  });

  try {
    if (typeof Babel === 'undefined') throw new Error('Babel(コード変換ツール)の読み込みに失敗しました。通信環境を確認してください。');
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') throw new Error('React の読み込みに失敗しました。通信環境を確認してください。');
    if (typeof Tone === 'undefined') throw new Error('Tone.js(音声ライブラリ)の読み込みに失敗しました。通信環境を確認してください。');

    var sourceEl = document.getElementById('app-source');
    var source = sourceEl.textContent;

    var transformed = Babel.transform(source, {
      presets: [['react', { runtime: 'classic' }]],
      filename: 'factor-hunt.jsx',
    }).code;

    var script = document.createElement('script');
    script.textContent = transformed;
    document.body.appendChild(script);

    var statusEl = document.getElementById('boot-status');
    if (statusEl) statusEl.style.display = 'none';
  } catch (err) {
    showBootError('起動時にエラーが発生しました', (err && err.stack) ? err.stack : String(err));
  }
})();
</script>
</body>
</html>
